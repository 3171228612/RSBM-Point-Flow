# Training RSBM Point Flow
# ε-Rectified Schrödinger Bridge Matching for Point Cloud Registration
#
# Usage:
#   python train.py --config-name RSBM_main
#
# Or override specific parameters:
#   python train.py --config-name RSBM_main model.epsilon=0.3 model.inference_sampling_steps=5

defaults:
  - model: rsbm_point_flow
  - data: ikea_partnet_everyday_twobytwo_modelnet_tudl
  - trainer: main
  - loggers: wandb
  - _self_

# Random seed for reproducibility
seed: 42

# Data root
data_root: "../dataset"

# Experiment name and log directory
experiment_name: RSBM_eps05_val50
log_dir: ./output/${experiment_name}
ckpt_path: ${log_dir}/last.ckpt
hydra:
  run:
    dir: ${log_dir}

# Model settings
model:
  encoder_ckpt: null
  flow_model_ckpt: null
